<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Documentos - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><path fill="white" d="M20,20 L80,20 L80,80 L20,80 Z M25,25 L75,25 L75,75 L25,75 Z"/><circle cx="50" cy="50" r="5" fill="white"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
        }

        .container {
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255,255,255,0.98);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42,82,152,0.1);
        }

        button {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            display: none;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .toggle-mode {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .toggle-mode a {
            color: #2a5298;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .toggle-mode a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .footer p {
            font-size: 12px;
            color: #999;
        }

        .footer .credit {
            margin-top: 8px;
            font-size: 11px;
            color: #aaa;
        }

        .footer .credit span {
            color: #ffc107;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>📁 Meus Documentos</h1>
                <p>Guarde e organize os seus trabalhos</p>
            </div>

            <div id="formContainer">
                <!-- Formulário de Login -->
                <div id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="********">
                    </div>
                    <button id="loginBtn">Entrar</button>
                    <div class="toggle-mode">
                        Não tem conta? <a id="showRegister">Criar conta gratuita</a>
                    </div>
                </div>

                <!-- Formulário de Registo -->
                <div id="registerForm" style="display: none;">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" placeholder="********">
                    </div>
                    <div class="form-group">
                        <label>Confirmar Password</label>
                        <input type="password" id="confirmPassword" placeholder="********">
                    </div>
                    <button id="registerBtn">Criar conta</button>
                    <div class="toggle-mode">
                        Já tem conta? <a id="showLogin">Fazer login</a>
                    </div>
                </div>
            </div>

            <div id="message" class="message"></div>

            <div class="footer">
                <p>Seus documentos ficam seguros e privados</p>
                <span style="background: linear-gradient(135deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600;">Desenvolvido por⚡ Kent Fernandes</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const showRegisterBtn = document.getElementById('showRegister');
        const showLoginBtn = document.getElementById('showLogin');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(texto, tipo) {
            messageDiv.textContent = texto;
            messageDiv.className = `message ${tipo}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            }, 4000);
        }

        function showLogin() {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            messageDiv.style.display = 'none';
            messageDiv.textContent = '';
        }

        function showRegister() {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            messageDiv.style.display = 'none';
            messageDiv.textContent = '';
        }

        showRegisterBtn.addEventListener('click', showRegister);
        showLoginBtn.addEventListener('click', showLogin);

        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            messageDiv.style.display = 'none';
            messageDiv.textContent = '';

            if (!email || !password) {
                showMessage('Preencha todos os campos', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.sucesso) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('userId', data.userId);
                    window.location.href = '/dashboard.html';
                } else {
                    showMessage(data.erro || 'Credenciais inválidas', 'error');
                }
            } catch (error) {
                console.error(error);
                showMessage('Erro de conexão', 'error');
            }
        });

        registerBtn.addEventListener('click', async () => {
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            messageDiv.style.display = 'none';
            messageDiv.textContent = '';

            if (!email || !password) {
                showMessage('Preencha todos os campos', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('As passwords não coincidem', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('A password deve ter pelo menos 6 caracteres', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.sucesso) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('userId', data.userId);
                    window.location.href = '/dashboard.html';
                } else {
                    showMessage(data.erro, 'error');
                }
            } catch (error) {
                console.error(error);
                showMessage('Erro de conexão', 'error');
            }
        });

        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
