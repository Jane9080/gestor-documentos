<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #2a5298;
        }

        button {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            display: none;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 12px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .toggle-mode {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .toggle-mode a {
            color: #2a5298;
            text-decoration: none;
            cursor: pointer;
        }

        .toggle-mode a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📁 Meus Documentos</h1>
            <p class="subtitle">Guarde e organize os seus trabalhos</p>

            <div id="formContainer">
                <!-- Formulário de Login -->
                <div id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="********">
                    </div>
                    <button id="loginBtn">Entrar</button>
                    <div class="toggle-mode">
                        Não tem conta? <a id="showRegister">Criar conta</a>
                    </div>
                </div>

                <!-- Formulário de Registo (escondido inicialmente) -->
                <div id="registerForm" style="display: none;">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" placeholder="********">
                    </div>
                    <div class="form-group">
                        <label>Confirmar Password</label>
                        <input type="password" id="confirmPassword" placeholder="********">
                    </div>
                    <button id="registerBtn">Criar conta</button>
                    <div class="toggle-mode">
                        Já tem conta? <a id="showLogin">Fazer login</a>
                    </div>
                </div>
            </div>

            <div id="message" class="message"></div>

            <div class="footer">
                <p>Seus documentos ficam seguros e privados</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // Elementos
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const showRegisterBtn = document.getElementById('showRegister');
        const showLoginBtn = document.getElementById('showLogin');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(texto, tipo) {
            // Limpar e mostrar a mensagem
            messageDiv.textContent = texto;
            messageDiv.className = `message ${tipo}`;
            messageDiv.style.display = 'block';
            
            // Esconder após 4 segundos
            setTimeout(() => {
                messageDiv.style.display = 'none';
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            }, 4000);
        }

        function showLogin() {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            messageDiv.style.display = 'none';
            messageDiv.textContent = '';
        }

        function showRegister() {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            messageDiv.style.display = 'none';
            messageDiv.textContent = '';
        }

        // Eventos de toggle
        showRegisterBtn.addEventListener('click', showRegister);
        showLoginBtn.addEventListener('click', showLogin);

        // Login
        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            // Limpar mensagem anterior
            messageDiv.style.display = 'none';
            messageDiv.textContent = '';

            if (!email || !password) {
                showMessage('Preencha todos os campos', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.sucesso) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('userId', data.userId);
                    window.location.href = '/dashboard.html';
                } else {
                    showMessage(data.erro || 'Credenciais inválidas', 'error');
                }
            } catch (error) {
                console.error(error);
                showMessage('Erro de conexão', 'error');
            }
        });

        // Registo
        registerBtn.addEventListener('click', async () => {
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            // Limpar mensagem anterior
            messageDiv.style.display = 'none';
            messageDiv.textContent = '';

            if (!email || !password) {
                showMessage('Preencha todos os campos', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('As passwords não coincidem', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('A password deve ter pelo menos 6 caracteres', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.sucesso) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('userId', data.userId);
                    window.location.href = '/dashboard.html';
                } else {
                    showMessage(data.erro, 'error');
                }
            } catch (error) {
                console.error(error);
                showMessage('Erro de conexão', 'error');
            }
        });

        // Se já estiver logado, redirecionar para dashboard
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
